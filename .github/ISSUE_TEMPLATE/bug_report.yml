name: Bug report
description: Report a defect in alfacode-team/http
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please do **not** report
        security issues here — see the [Security Policy](../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the expected vs. actual result.
      placeholder: When I call Response::json(...) with ..., I get ... but expected ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet that reproduces the problem.
      render: php
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.0"
    validations:
      required: true
  - type: dropdown
    id: sapi
    attributes:
      label: Runtime
      options:
        - PHP-FPM / mod_php
        - CLI
        - OpenSwoole / Swoole
        - Other
    validations:
      required: false
