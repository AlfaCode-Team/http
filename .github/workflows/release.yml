name: Release

# Publishes a GitHub Release. Two entry points:
#   • a pushed tag `v*`      — manual escape hatch
#   • workflow_call(version) — invoked by auto-release.yml on merge to main
# (the default token cannot let a tag push trigger this workflow, so the
#  auto-release path calls it directly).

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        description: 'Release version without the leading v (e.g. 1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, ctype, json, fileinfo
          coverage: none
          tools: composer:v2
      - run: composer validate --strict
      - run: composer update --prefer-dist --no-interaction --no-progress
      - run: composer analyse
      - run: composer test

  release:
    needs: test
    runs-on: ubuntu-latest
    name: Publish GitHub Release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
